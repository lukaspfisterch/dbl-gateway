<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DBL Gateway — Event Observer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 14px;
  height: 100vh;
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr auto;
}
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #2a2a4a;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 {
  font-size: 15px;
  font-weight: 600;
  color: #a0a0c0;
  letter-spacing: 0.5px;
}
.header-meta {
  font-size: 12px;
  color: #555;
}
.header-meta span { margin-right: 12px; }
.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #666;
}
.status-dot.live { background: #4aff9e; }
.status-dot.error { background: #ff4a4a; }

/* Sidebar */
#sidebar {
  overflow-y: auto;
  border-right: 1px solid #2a2a4a;
  padding: 0;
}
.panel {
  border-bottom: 1px solid #2a2a4a;
  padding: 12px 16px;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  color: #666;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title-buttons {
  display: flex;
  gap: 4px;
}
.panel-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}
.panel-label { color: #666; }
.panel-value { color: #a0a0c0; }
.panel-value.phase { font-weight: 700; }
.phase-IDLE      { color: #666; }
.phase-INTENT    { color: #4a9eff; }
.phase-DECISION  { color: #4aff9e; }
.phase-PROOF     { color: #b44aff; }
.phase-EXECUTION { color: #ff9e4a; }
.panel-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
}
.badge-ok    { background: #4aff9e22; color: #4aff9e; border: 1px solid #4aff9e44; }
.badge-error { background: #ff4a4a22; color: #ff4a4a; border: 1px solid #ff4a4a44; }
.badge-warn  { background: #ff9e4a22; color: #ff9e4a; border: 1px solid #ff9e4a44; }
.digest {
  color: #555;
  font-size: 11px;
  cursor: default;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 180px;
  display: inline-block;
}
.panel-section {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #222244;
}
.panel-section-title {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.btn-sm {
  background: #2a2a4a;
  color: #a0a0c0;
  border: 1px solid #3a3a5a;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
}
.btn-sm:hover { background: #3a3a5a; }

/* Event stream */
#event-log {
  overflow-y: auto;
  padding: 4px 0;
}
.turn-sep {
  height: 1px;
  background: #2a2a4a;
  margin: 4px 20px;
}
.event-row {
  display: grid;
  grid-template-columns: 50px 95px 1fr 80px 80px 60px;
  align-items: center;
  gap: 8px;
  padding: 5px 20px;
  font-size: 13px;
}
.event-row:hover { background: #22224a; }
.event-row.turn-child {
  padding-left: 32px;
}
/* Clickable DECISION rows */
.event-row.clickable { cursor: pointer; }
.event-row.clickable:hover { background: #1a2a3a; }
/* Turn highlight during replay verification */
.event-row.turn-highlight { background: #1a2a3a; }
.event-idx {
  color: #555;
  text-align: right;
}
.event-kind {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-align: center;
}
.kind-INTENT     { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff44; }
.kind-DECISION   { background: #4aff9e22; color: #4aff9e; border: 1px solid #4aff9e44; }
.kind-PROOF      { background: #b44aff22; color: #b44aff; border: 1px solid #b44aff44; }
.kind-EXECUTION  { background: #ff9e4a22; color: #ff9e4a; border: 1px solid #ff9e4a44; }
.event-intent-type { color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-corr { color: #555; font-size: 12px; }
.event-actor { color: #666; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-dt {
  color: #666;
  font-size: 11px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.event-dt.slow { color: #ff9e4a; }
footer {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-top: 1px solid #2a2a4a;
}
.count { color: #555; font-size: 12px; }
button {
  background: #2a2a4a;
  color: #a0a0c0;
  border: 1px solid #3a3a5a;
  padding: 4px 14px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
button:hover { background: #3a3a5a; }
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #444;
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>DBL Gateway &mdash; Event Observer</h1>
    <div class="header-meta">
      <span id="stream-label">stream: default</span>
      <span id="event-count">0 events</span>
    </div>
  </div>
  <div class="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting</span>
  </div>
</header>

<div id="sidebar">
  <!-- Agent Activity panel -->
  <div class="panel" id="panel-activity">
    <div class="panel-title">Agent Activity</div>
    <div class="panel-row">
      <span class="panel-label">Phase</span>
      <span class="panel-value phase phase-IDLE" id="act-phase">IDLE</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Last INTENT</span>
      <span class="panel-value" id="act-intent">&mdash;</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Last DECISION</span>
      <span class="panel-value" id="act-decision">&mdash;</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Last PROOF</span>
      <span class="panel-value" id="act-proof">&mdash;</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Last EXECUTION</span>
      <span class="panel-value" id="act-execution">&mdash;</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Turns</span>
      <span class="panel-value" id="act-turns">0</span>
    </div>
  </div>

  <!-- Capabilities panel -->
  <div class="panel" id="panel-capabilities">
    <div class="panel-title">Capabilities</div>
    <div id="caps-content">
      <div class="panel-row"><span class="panel-label">Loading&hellip;</span></div>
    </div>
  </div>

  <!-- Verify panel -->
  <div class="panel" id="panel-verify">
    <div class="panel-title">
      <span>Verify</span>
      <div class="panel-title-buttons">
        <button class="btn-sm" onclick="verifyChain()">Verify Chain</button>
        <button class="btn-sm" onclick="refreshVerify()">Refresh</button>
      </div>
    </div>
    <div id="verify-content">
      <div class="panel-row"><span class="panel-label">Loading&hellip;</span></div>
    </div>
    <div id="chain-result"></div>
    <div id="replay-result"></div>
  </div>
</div>

<div id="event-log">
  <div class="empty-state" id="empty-state">Waiting for events&hellip;</div>
</div>

<footer>
  <span class="count" id="footer-info"></span>
  <button onclick="clearLog()">Clear</button>
</footer>

<script>
(function () {
  "use strict";

  var log = document.getElementById("event-log");
  var emptyState = document.getElementById("empty-state");
  var statusDot = document.getElementById("status-dot");
  var statusText = document.getElementById("status-text");
  var countEl = document.getElementById("event-count");
  var count = 0;

  // Turn tracking for grouping and delta-time
  var lastCorrelationId = null;
  var turnTimestamps = {};  // correlation_id -> { first: Date, last: Date }

  // Event row registry for turn highlighting
  var eventRows = [];  // { row: HTMLElement, evt: object }

  // ── Agent Activity state ────────────────────────────────────────
  var activity = {
    currentCorrelationId: null,
    currentPhase: "IDLE",
    turnCount: 0,
    seenCorrelations: {},
    lastByKind: {}
  };

  function updateActivity(evt) {
    var cid = evt.correlation_id || "";
    activity.lastByKind[evt.kind] = evt;
    if (cid && !activity.seenCorrelations[cid]) {
      activity.seenCorrelations[cid] = true;
      activity.turnCount++;
    }
    activity.currentCorrelationId = cid;
    activity.currentPhase = evt.kind;
    renderActivity();
  }

  function renderActivity() {
    var phaseEl = document.getElementById("act-phase");
    phaseEl.textContent = activity.currentPhase;
    phaseEl.className = "panel-value phase phase-" + activity.currentPhase;

    var kinds = ["INTENT", "DECISION", "PROOF", "EXECUTION"];
    var ids   = ["act-intent", "act-decision", "act-proof", "act-execution"];
    for (var i = 0; i < kinds.length; i++) {
      var el = document.getElementById(ids[i]);
      var last = activity.lastByKind[kinds[i]];
      el.textContent = last ? "#" + last.index : "\u2014";
    }

    document.getElementById("act-turns").textContent = activity.turnCount;
  }

  // ── Capabilities (one-time fetch) ───────────────────────────────
  function loadCapabilities() {
    fetch("/ui/capabilities")
      .then(function (r) { return r.json(); })
      .then(function (caps) { renderCapabilities(caps); })
      .catch(function () {
        document.getElementById("caps-content").innerHTML =
          '<div class="panel-row"><span class="panel-label">Unavailable</span></div>';
      });
  }

  function renderCapabilities(caps) {
    var html = "";
    if (caps.gateway_version) {
      html += row("Gateway", caps.gateway_version);
    }
    if (caps.interface_version != null) {
      html += row("Interface", "v" + caps.interface_version);
    }

    // Providers
    var providers = caps.providers || [];
    for (var i = 0; i < providers.length; i++) {
      var p = providers[i];
      html += '<div class="panel-section">';
      html += '<div class="panel-section-title">' + esc(p.id || "provider") + '</div>';
      var models = p.models || [];
      for (var j = 0; j < models.length; j++) {
        var m = models[j];
        var hs = (m.health && m.health.status) || "unknown";
        var badge = hs === "ok"
          ? '<span class="panel-badge badge-ok">ok</span>'
          : '<span class="panel-badge badge-error">' + esc(hs) + '</span>';
        html += '<div class="panel-row"><span class="panel-label">' + esc(m.id || "") + '</span>' + badge + '</div>';
      }
      html += '</div>';
    }

    // Surfaces (object: {tail: true, snapshot: true, ...})
    var surfaces = caps.surfaces || {};
    var activeSurfaces = Object.keys(surfaces).filter(function (k) { return surfaces[k]; });
    if (activeSurfaces.length) {
      html += '<div class="panel-section">';
      html += '<div class="panel-section-title">Surfaces</div>';
      html += '<div class="panel-row"><span class="panel-value">' + activeSurfaces.map(esc).join(", ") + '</span></div>';
      html += '</div>';
    }

    document.getElementById("caps-content").innerHTML = html;
  }

  function row(label, value) {
    return '<div class="panel-row"><span class="panel-label">' + esc(label) + '</span><span class="panel-value">' + esc(value) + '</span></div>';
  }

  function esc(s) {
    var d = document.createElement("span");
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Verify (periodic + manual) ─────────────────────────────────
  var lastDecisionFromSSE = null;

  function trackDecision(evt) {
    if (evt.kind === "DECISION") {
      lastDecisionFromSSE = evt;
    }
  }

  window.refreshVerify = function () {
    fetch("/ui/snapshot?limit=1&offset=0")
      .then(function (r) { return r.json(); })
      .then(function (snap) { renderVerify(snap); })
      .catch(function () {
        document.getElementById("verify-content").innerHTML =
          '<div class="panel-row"><span class="panel-label">Unavailable</span></div>';
      });
  };

  function renderVerify(snap) {
    var html = "";

    // v_digest
    var vd = snap.v_digest || "";
    var vdShort = vd.length > 20 ? vd.substring(0, 20) + "\u2026" : vd;
    html += '<div class="panel-row"><span class="panel-label">v_digest</span><span class="digest" title="' + esc(vd) + '">' + esc(vdShort) + '</span></div>';

    // event count
    var evtCount = snap.length != null ? snap.length : (snap.events ? snap.events.length : "?");
    html += row("Events", evtCount);

    // Last decision info from SSE
    if (lastDecisionFromSSE) {
      html += '<div class="panel-section">';
      html += '<div class="panel-section-title">Last Decision</div>';
      html += row("Index", "#" + lastDecisionFromSSE.index);

      var payload = lastDecisionFromSSE.payload || {};
      if (payload.policy_config_digest) {
        var pcd = payload.policy_config_digest;
        var pcdShort = pcd.length > 20 ? pcd.substring(0, 20) + "\u2026" : pcd;
        html += '<div class="panel-row"><span class="panel-label">policy_config</span><span class="digest" title="' + esc(pcd) + '">' + esc(pcdShort) + '</span></div>';
      }
      if (lastDecisionFromSSE.intent_index != null) {
        html += row("intent_index", lastDecisionFromSSE.intent_index);
      }
      html += '</div>';
    }

    document.getElementById("verify-content").innerHTML = html;
  }

  // ── Chain Verification ─────────────────────────────────────────
  window.verifyChain = function () {
    var el = document.getElementById("chain-result");
    el.innerHTML = '<div class="panel-section"><div class="panel-section-title">Chain Verification</div><div class="panel-row"><span class="panel-label">Verifying&hellip;</span></div></div>';

    fetch("/ui/verify-chain")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var html = '<div class="panel-section"><div class="panel-section-title">Chain Verification</div>';
        if (data.match) {
          html += '<div class="panel-row"><span class="panel-label">Chain</span><span class="panel-badge badge-ok">VALID</span></div>';
        } else {
          html += '<div class="panel-row"><span class="panel-label">Chain</span><span class="panel-badge badge-error">MISMATCH</span></div>';
          var rd = data.rolling_digest || "";
          var rc = data.recomputed_digest || "";
          html += '<div class="panel-row"><span class="panel-label">Rolling</span><span class="digest" title="' + esc(rd) + '">' + esc(rd.substring(0, 16) + "\u2026") + '</span></div>';
          html += '<div class="panel-row"><span class="panel-label">Recomputed</span><span class="digest" title="' + esc(rc) + '">' + esc(rc.substring(0, 16) + "\u2026") + '</span></div>';
        }
        html += row("Events checked", data.event_count);
        if (data.warning) {
          html += '<div class="panel-row"><span class="panel-badge badge-warn">' + esc(data.warning) + '</span></div>';
        }
        html += '</div>';
        el.innerHTML = html;
      })
      .catch(function () {
        el.innerHTML = '<div class="panel-section"><div class="panel-section-title">Chain Verification</div><div class="panel-row"><span class="panel-badge badge-error">Failed</span></div></div>';
      });
  };

  // ── Decision Replay ────────────────────────────────────────────
  function replayDecision(evt) {
    var threadId = evt.thread_id;
    var turnId = evt.turn_id;
    if (!threadId || !turnId) return;

    // Highlight turn events
    highlightTurn(evt.correlation_id);

    var el = document.getElementById("replay-result");
    el.innerHTML = '<div class="panel-section"><div class="panel-section-title">Decision Replay</div><div class="panel-row"><span class="panel-label">Replaying #' + evt.index + '&hellip;</span></div></div>';

    fetch("/ui/replay?thread_id=" + encodeURIComponent(threadId) + "&turn_id=" + encodeURIComponent(turnId))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var html = '<div class="panel-section"><div class="panel-section-title">Decision Replay</div>';
        if (data.error) {
          html += '<div class="panel-row"><span class="panel-badge badge-error">' + esc(data.error) + '</span></div>';
          html += '<div class="panel-row"><span class="panel-label" style="font-size:10px">' + esc(data.detail || "") + '</span></div>';
        } else if (data.match) {
          html += '<div class="panel-row"><span class="panel-label">Decision #' + data.decision_index + '</span><span class="panel-badge badge-ok">VALID</span></div>';
        } else {
          html += '<div class="panel-row"><span class="panel-label">Decision #' + data.decision_index + '</span><span class="panel-badge badge-error">MISMATCH</span></div>';
          var sd = data.stored_digest || "";
          var rd = data.recomputed_digest || "";
          html += '<div class="panel-row"><span class="panel-label">Stored</span><span class="digest" title="' + esc(sd) + '">' + esc(sd.substring(0, 16) + "\u2026") + '</span></div>';
          html += '<div class="panel-row"><span class="panel-label">Recomputed</span><span class="digest" title="' + esc(rd) + '">' + esc(rd.substring(0, 16) + "\u2026") + '</span></div>';
        }
        html += '</div>';
        el.innerHTML = html;
      })
      .catch(function () {
        el.innerHTML = '<div class="panel-section"><div class="panel-section-title">Decision Replay</div><div class="panel-row"><span class="panel-badge badge-error">Failed</span></div></div>';
      });
  }

  function highlightTurn(correlationId) {
    // Clear previous highlights
    for (var i = 0; i < eventRows.length; i++) {
      eventRows[i].row.classList.remove("turn-highlight");
    }
    // Highlight matching
    if (correlationId) {
      for (var j = 0; j < eventRows.length; j++) {
        if (eventRows[j].evt.correlation_id === correlationId) {
          eventRows[j].row.classList.add("turn-highlight");
        }
      }
    }
  }

  // ── Status ──────────────────────────────────────────────────────
  function setStatus(text, state) {
    statusText.textContent = text;
    statusDot.className = "status-dot " + state;
  }

  function updateCount() {
    countEl.textContent = count + " event" + (count !== 1 ? "s" : "");
  }

  // ── Event stream ────────────────────────────────────────────────
  function appendEvent(evt) {
    if (emptyState) {
      emptyState.remove();
      emptyState = null;
    }

    // Update sidebar panels
    updateActivity(evt);
    trackDecision(evt);

    var cid = evt.correlation_id || "";
    var now = new Date();
    var isNewTurn = cid !== lastCorrelationId;
    var isChild = evt.kind !== "INTENT" && !isNewTurn;

    // Insert turn separator when correlation_id changes
    if (isNewTurn && count > 0) {
      var sep = document.createElement("div");
      sep.className = "turn-sep";
      log.appendChild(sep);
    }

    // Track timestamps per turn
    if (!turnTimestamps[cid]) {
      turnTimestamps[cid] = { first: now, last: now };
    }
    var dt = now - turnTimestamps[cid].last;
    turnTimestamps[cid].last = now;

    var r = document.createElement("div");
    r.className = "event-row" + (isChild ? " turn-child" : "");

    // Make DECISION rows clickable for replay
    if (evt.kind === "DECISION") {
      r.classList.add("clickable");
      r.addEventListener("click", (function (e) {
        return function () { replayDecision(e); };
      })(evt));
    }

    // #index
    var idx = document.createElement("span");
    idx.className = "event-idx";
    idx.textContent = "#" + (evt.index != null ? evt.index : "?");

    // KIND badge
    var kind = document.createElement("span");
    kind.className = "event-kind kind-" + (evt.kind || "UNKNOWN");
    kind.textContent = evt.kind || "UNKNOWN";

    // intent_type
    var intentType = document.createElement("span");
    intentType.className = "event-intent-type";
    intentType.textContent = evt.intent_type || "";

    // correlation_id (truncated)
    var corr = document.createElement("span");
    corr.className = "event-corr";
    corr.textContent = cid.length > 8 ? cid.substring(0, 8) + "\u2026" : cid;
    corr.title = cid;

    // actor
    var actor = document.createElement("span");
    actor.className = "event-actor";
    actor.textContent = evt.actor || "";

    // delta-time (skip for first event in turn)
    var dtEl = document.createElement("span");
    dtEl.className = "event-dt";
    if (!isNewTurn && dt > 0) {
      var dtText;
      if (dt < 1000) {
        dtText = dt + "ms";
      } else {
        dtText = (dt / 1000).toFixed(1) + "s";
      }
      dtEl.textContent = "\u0394" + dtText;
      if (dt > 2000) dtEl.classList.add("slow");
    }

    r.appendChild(idx);
    r.appendChild(kind);
    r.appendChild(intentType);
    r.appendChild(corr);
    r.appendChild(dtEl);
    r.appendChild(actor);
    log.appendChild(r);

    // Register for turn highlighting
    eventRows.push({ row: r, evt: evt });

    lastCorrelationId = cid;
    count++;
    updateCount();

    log.scrollTop = log.scrollHeight;
  }

  window.clearLog = function () {
    while (log.firstChild) log.removeChild(log.firstChild);
    count = 0;
    lastCorrelationId = null;
    turnTimestamps = {};
    eventRows = [];
    activity = {
      currentCorrelationId: null,
      currentPhase: "IDLE",
      turnCount: 0,
      seenCorrelations: {},
      lastByKind: {}
    };
    lastDecisionFromSSE = null;
    updateCount();
    renderActivity();
    document.getElementById("chain-result").innerHTML = "";
    document.getElementById("replay-result").innerHTML = "";
    emptyState = document.createElement("div");
    emptyState.className = "empty-state";
    emptyState.id = "empty-state";
    emptyState.textContent = "Waiting for events\u2026";
    log.appendChild(emptyState);
  };

  // ── SSE connection ──────────────────────────────────────────────
  function connect() {
    setStatus("Connecting", "");
    var es = new EventSource("/ui/tail");

    es.addEventListener("envelope", function (e) {
      try {
        var data = JSON.parse(e.data);
        appendEvent(data);
      } catch (err) {
        console.error("Failed to parse SSE event:", err);
      }
    });

    es.onopen = function () {
      setStatus("Live", "live");
    };

    es.onerror = function () {
      setStatus("Disconnected", "error");
    };
  }

  // ── Init ────────────────────────────────────────────────────────
  connect();
  loadCapabilities();
  refreshVerify();
  setInterval(refreshVerify, 5000);

})();
</script>
</body>
